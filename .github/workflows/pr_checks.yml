name: PR Checks

on:
  pull_request:
    branches: [ dev ]

jobs:
  lint-sql:
    name: Lint dbt models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff Linting
        run: sqlfluff lint ./poc_deploy/models --dialect snowflake --exclude-rules RF04