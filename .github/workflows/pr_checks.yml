name: PR Checks

on:
  pull_request:
    branches: [ dev ]

jobs:
  lint-sql:
    name: Lint dbt models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff Linting
        run: sqlfluff lint ./poc_deploy/models --dialect snowflake --exclude-rules RF04

  test-dbt:
    name: Test dbt models
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref }}
    if: ${{ !contains(github.event.pull_request.title, '[skip test]') && !contains(github.event.pull_request.body, '[skip test]') }}
    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      # If we configure this, we can remove this part https://docs.snowflake.com/en/user-guide/data-engineering/dbt-projects-on-snowflake-dependencies
      - name: Install dbt and run deps
        run: |
          pip install dbt-snowflake
          dbt deps --project-dir ./poc_deploy --target ${{ github.ref_name }} -x

      - name: Run dbt test
        run: snow dbt test --project-dir ./poc_deploy --target ${{ github.ref_name }} -x
