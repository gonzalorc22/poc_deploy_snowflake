name: 'poc_deploy'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'poc_deploy'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  poc_deploy:
    # Config indicated by + and target_schema apply to all files under models/staging/
    staging:
      +materialized: view
      +schema: staging
    # Config indicated by + and target_schema apply to all files under models/marts/
    marts:
      +materialized: table
      +schema: marts
